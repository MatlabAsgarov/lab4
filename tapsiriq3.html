<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Məhsul Kartı</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
            margin: 0;
            font-family: 'Arial', sans-serif;
        }
        .product-card {
            background-color: #ffffff;
            width: 320px;
            padding: 30px 20px 20px 20px;
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            box-sizing: border-box;
        }
        .product-image {
            width: 100%;
            height: auto;
            max-height: 300px;
            object-fit: contain;
            margin-bottom: 20px;
        }
        .product-name {
            font-size: 18px;
            font-weight: bold;
            color: #000000;
            margin: 0 0 15px 0;
        }

        .product-price {
            font-size: 18px;
            font-weight: bold;
            color: #2E7D32; 
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="product-card">
        <img class="product-image" src="https://images.officialapplereseller.id/catalog/product/i/p/iphone_13_blue_pure_back_iphone_13_blue_pure_front_2-up_screen__us-en.png" alt="iPhone 13">
        
        <h3 class="product-name">iPhone 13</h3>
        
        <p class="product-price">1200 AZN</p>
    </div>

</body>
</html>
