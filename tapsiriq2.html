<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tapşırıq 2</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        .red-box {
            width: 500px;
            height: 500px;
            background-color: #E32619;
            display: flex;
            justify-content: center; 
            align-items: center;     
            gap: 10px;              
        }
        .blue-box {
            width: 80px;
            height: 80px;
            background-color: #0000FF; 
            border: 1px solid #000;    
            display: flex;
            justify-content: center;   
            align-items: center;       
            color: black;             
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="red-box">
        <div class="blue-box">1</div>
        <div class="blue-box">2</div>
        <div class="blue-box">3</div>
        <div class="blue-box">4</div>
    </div>

</body>
</html>
